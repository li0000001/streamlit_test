name: Wake Up Streamlit Apps

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  wake_up:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        url:
          - "https://app-server-91132132.streamlit.app"
          - "https://apptest-2osmliaqb4a5skcpnyxlgx.streamlit.app"
          - "https://app-server-fntyqchym3xdmwrsyy3wxd.streamlit.app"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: pip install playwright

      - name: Install browser binaries
        run: playwright install --with-deps

      - name: Wake up ${{ matrix.url }}
        run: python wakeup_script.py "${{ matrix.url }}"
